<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 140 140" fill="none">
  <!-- Background circle -->
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1;stop-opacity:0.12"/>
      <stop offset="100%" style="stop-color:#8b5cf6;stop-opacity:0.06"/>
    </linearGradient>
    <linearGradient id="stroke" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1"/>
      <stop offset="100%" style="stop-color:#8b5cf6"/>
    </linearGradient>
  </defs>
  <circle cx="70" cy="70" r="66" fill="url(#bg)" stroke="url(#stroke)" stroke-width="3"/>
  <!-- Magnifying glass -->
  <circle cx="62" cy="58" r="26" stroke="url(#stroke)" stroke-width="4.5" fill="none"/>
  <line x1="81" y1="77" x2="104" y2="100" stroke="url(#stroke)" stroke-width="4.5" stroke-linecap="round"/>
  <!-- Checkmark -->
  <path d="M50 58 L58 66 L74 50" stroke="#22c55e" stroke-width="4.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
</svg>
