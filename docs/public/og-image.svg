<svg width="1200" height="630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f0f1a"/>
      <stop offset="100%" style="stop-color:#1a1a2e"/>
    </linearGradient>
    <linearGradient id="brand" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1"/>
      <stop offset="50%" style="stop-color:#8b5cf6"/>
      <stop offset="100%" style="stop-color:#a78bfa"/>
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1;stop-opacity:0.15"/>
      <stop offset="100%" style="stop-color:#8b5cf6;stop-opacity:0"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Glow effect -->
  <ellipse cx="600" cy="280" rx="400" ry="250" fill="url(#glow)"/>

  <!-- Decorative dots -->
  <circle cx="150" cy="120" r="2" fill="#6366f1" opacity="0.3"/>
  <circle cx="300" cy="80" r="1.5" fill="#a78bfa" opacity="0.25"/>
  <circle cx="900" cy="100" r="2" fill="#8b5cf6" opacity="0.3"/>
  <circle cx="1050" cy="150" r="1.5" fill="#6366f1" opacity="0.2"/>
  <circle cx="200" cy="500" r="1.5" fill="#a78bfa" opacity="0.2"/>
  <circle cx="1000" cy="520" r="2" fill="#8b5cf6" opacity="0.25"/>

  <!-- Logo icon (magnifying glass + check) -->
  <g transform="translate(540, 160)">
    <circle cx="50" cy="50" r="44" stroke="url(#brand)" stroke-width="5" fill="none" opacity="0.9"/>
    <line x1="82" y1="82" x2="110" y2="110" stroke="url(#brand)" stroke-width="5" stroke-linecap="round" opacity="0.9"/>
    <polyline points="30,52 45,67 72,35" stroke="#a78bfa" stroke-width="5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  </g>

  <!-- Title -->
  <text x="600" y="330" text-anchor="middle" font-family="Inter, -apple-system, BlinkMacSystemFont, sans-serif" font-size="56" font-weight="800" fill="url(#brand)" letter-spacing="-1">QA Engineer Hub</text>

  <!-- Subtitle -->
  <text x="600" y="385" text-anchor="middle" font-family="Inter, -apple-system, BlinkMacSystemFont, sans-serif" font-size="22" font-weight="400" fill="#a1a1aa" letter-spacing="0.5">Knowledge Base for QA Engineers</text>

  <!-- Tags -->
  <g transform="translate(600, 440)" text-anchor="middle">
    <rect x="-280" y="-16" width="90" height="32" rx="16" fill="#6366f1" fill-opacity="0.15"/>
    <text x="-235" y="6" font-family="Inter, sans-serif" font-size="13" font-weight="600" fill="#818cf8">Testing</text>

    <rect x="-170" y="-16" width="120" height="32" rx="16" fill="#6366f1" fill-opacity="0.15"/>
    <text x="-110" y="6" font-family="Inter, sans-serif" font-size="13" font-weight="600" fill="#818cf8">Automation</text>

    <rect x="-30" y="-16" width="60" height="32" rx="16" fill="#6366f1" fill-opacity="0.15"/>
    <text x="0" y="6" font-family="Inter, sans-serif" font-size="13" font-weight="600" fill="#818cf8">API</text>

    <rect x="50" y="-16" width="110" height="32" rx="16" fill="#6366f1" fill-opacity="0.15"/>
    <text x="105" y="6" font-family="Inter, sans-serif" font-size="13" font-weight="600" fill="#818cf8">CI/CD</text>

    <rect x="180" y="-16" width="100" height="32" rx="16" fill="#6366f1" fill-opacity="0.15"/>
    <text x="230" y="6" font-family="Inter, sans-serif" font-size="13" font-weight="600" fill="#818cf8">Security</text>
  </g>

  <!-- Bottom line -->
  <rect x="400" y="510" width="400" height="1" fill="#6366f1" opacity="0.15"/>

  <!-- URL -->
  <text x="600" y="555" text-anchor="middle" font-family="Inter, sans-serif" font-size="16" font-weight="500" fill="#52525b" letter-spacing="1">xbsvhn.github.io/qa-engineer-hub</text>

  <!-- Bottom border accent -->
  <rect x="0" y="626" width="1200" height="4" fill="url(#brand)"/>
</svg>
